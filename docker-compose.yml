services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whats_in_my_fridge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d whats_in_my_fridge"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      WIMF_DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/whats_in_my_fridge
      WIMF_ALLOWED_ORIGINS: '["http://localhost:8080", "http://localhost:5173"]'
    ports:
      - "18000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:18000
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
